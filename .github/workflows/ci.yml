name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff -r requirements.txt

      - name: Ruff
        run: python -m ruff check .

      - name: Smoke test
        run: |
          python - <<'PY'
          from pathlib import Path
          from src.pick_counter import counter_picks

          expected = {
              "example_1": 6,
              "example_2": 6,
              "example_3": 6,
              "example_4": 5,
              "example_5": 6,
              "example_6": 5,
          }

          for stem, count in expected.items():
              result = counter_picks(Path("input") / f"{stem}.jpg")
              assert result["n_picks"] == count, (stem, result)
              assert sum(result["colors"].values()) == count, (stem, result)
          PY
